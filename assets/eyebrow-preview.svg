<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111820" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="heroBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef5f7"/>
      <stop offset="1" stop-color="#cfdde7"/>
    </linearGradient>
    <linearGradient id="darkBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111820"/>
      <stop offset="1" stop-color="#263849"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="#f5f5f7"/>

  <text x="70" y="74" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="30" font-weight="800" fill="#111820">小標題樣式預覽</text>
  <text x="70" y="112" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="18" fill="#607080">將原本紅字小標題改為更明確的模組標籤：序號 + 頁面名稱 + 高對比膠囊底色</text>

  <g transform="translate(70 155)" filter="url(#shadow)">
    <rect width="1060" height="190" rx="30" fill="url(#heroBg)"/>
    <g transform="translate(390 34)">
      <rect width="340" height="56" rx="28" fill="#c6472b"/>
      <rect x="10" y="10" width="36" height="36" rx="18" fill="#ffffff" opacity="0.95"/>
      <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#c6472b">01</text>
      <text x="62" y="35" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="23" font-weight="900" fill="#ffffff">首頁｜技職達人</text>
    </g>
    <text x="530" y="122" text-anchor="middle" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="48" font-weight="900" fill="#111820">從車輛現場，開出自己的專業路。</text>
  </g>

  <g transform="translate(70 385)" filter="url(#shadow)">
    <rect width="510" height="300" rx="30" fill="#e9f1f2"/>
    <g transform="translate(54 44)">
      <rect width="280" height="56" rx="28" fill="#0b6f87"/>
      <rect x="10" y="10" width="36" height="36" rx="18" fill="#ffffff" opacity="0.95"/>
      <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0b6f87">02</text>
      <text x="62" y="35" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="23" font-weight="900" fill="#ffffff">科系定位</text>
    </g>
    <text x="54" y="142" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="34" font-weight="900" fill="#111820">不只修車，</text>
    <text x="54" y="188" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="34" font-weight="900" fill="#111820">而是診斷一套系統。</text>
    <text x="54" y="238" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="18" fill="#304151">淺色模組使用藍綠標籤，視覺更清楚。</text>
  </g>

  <g transform="translate(620 385)" filter="url(#shadow)">
    <rect width="510" height="300" rx="30" fill="url(#darkBg)"/>
    <g transform="translate(54 44)">
      <rect width="280" height="56" rx="28" fill="#e2aa2b"/>
      <rect x="10" y="10" width="36" height="36" rx="18" fill="#111820" opacity="0.95"/>
      <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#e2aa2b">09</text>
      <text x="62" y="35" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="23" font-weight="900" fill="#111820">自學軟體</text>
    </g>
    <text x="54" y="142" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff">AI 互動式學習軟體。</text>
    <text x="54" y="198" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="18" fill="#d9e6ec">深色模組使用金色標籤，和內容層級分明。</text>
  </g>

  <g transform="translate(70 730)">
    <rect width="1060" height="1" fill="#d9dee5"/>
    <text x="0" y="42" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, Arial, sans-serif" font-size="18" fill="#607080">套用後每頁小標題會依序改成：01 首頁、02 科系定位、03 學生目標、04 亮點成果、05 升學就業、06 業界實習、07 現場照片、08 檢定設備、09 企業合作、10 自學軟體、11 課程地圖、12 加入我們。</text>
  </g>
</svg>
